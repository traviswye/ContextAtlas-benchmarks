# Locked prompt set for the ContextAtlas benchmark — target repo: hono.
#
# Committed as pre-registration per STEP-7-PLAN.md §2: once these
# prompts run against a baseline condition, their text is frozen.
# Any paraphrase or reformat invalidates prior results.
#
# Step-7 runs ONLY entries with bucket != "held_out". Held-out
# entries are placeholders for the step-13 extended suite — their
# prompt text is drafted when that session begins. Do not draft
# held-out prompt text without session-level approval.

prompts:
  - prompt_id: h1-context-runtime
    target_symbol: Context
    task_category: constraint
    bucket: win
    prompt: "If I'm writing a new Hono route handler, what can I safely assume is on Context at runtime? I want to make sure my handler works in both Cloudflare Workers and Node."

  - prompt_id: h2-router-contract
    target_symbol: RegExpRouter
    task_category: impact/constraint
    bucket: win
    prompt: "I want to replace RegExpRouter with my own implementation. What's the contract I need to satisfy?"

  - prompt_id: h3-middleware-onion
    target_symbol: compose
    task_category: localize
    bucket: win
    prompt: "Where is Hono's middleware onion actually composed? I need to understand what `next()` is doing mechanically."

  - prompt_id: h4-validator-typeflow
    target_symbol: validator
    task_category: constraint
    bucket: win
    prompt: "I want to add a zod validator to a route. How does the validator's type flow into the handler and the typed RPC client?"

  - prompt_id: h5-hono-generics
    target_symbol: Hono
    task_category: impact
    bucket: tie
    prompt: "If I change the Hono class's type parameters, which downstream types would need to update?"

  - prompt_id: h6-fetch-signature
    target_symbol: Hono.fetch
    task_category: localize
    bucket: trick
    prompt: "What's the signature of Hono's `.fetch` method? I need to mount a Hono app inside another framework."

  # ------------------------------------------------------------
  # Held-out for step 13. Prompt text drafted in this session to
  # prevent step-13 drift (STEP-7-PLAN.md §1). `bucket: held_out`
  # remains the step-7 runner gate; `step13_bucket` is the real
  # classification the step-13 driver reads.
  # ------------------------------------------------------------

  - prompt_id: h7-jsx-backend-integration
    target_symbol: JSXNode
    bucket: held_out
    step13_bucket: win
    prompt: "I want to write JSX components that work in both Hono's server-side rendering and its DOM runtime. What are the constraints I need to respect?"
    notes: "ADR-05 jsx backends."

  - prompt_id: h8-context-sharing
    target_symbol: Context
    bucket: held_out
    step13_bucket: win
    prompt: "I need to share data across middleware for a single request. How does the Context lifetime work — can I store something in one middleware and read it in another, and when does it get cleared?"
    notes: "ADR-01 Context lifetime."

  - prompt_id: h9-middleware-return-semantics
    target_symbol: compose
    bucket: held_out
    step13_bucket: win
    prompt: "I'm writing a middleware that sometimes wants to short-circuit the request and return a Response, and sometimes wants to let the next handler run. What's the difference between returning a Response and calling `next()` — does order matter?"
    notes: "ADR-03 middleware return-vs-next."

  - prompt_id: h10-env-type-on-context
    target_symbol: Bindings
    bucket: held_out
    step13_bucket: tie
    prompt: "I'm using Hono on Cloudflare Workers and I want `c.env` to be typed correctly for my bindings. How do I do that?"
    notes: "env type on Context. Source note called this tie/trick; locked as tie."

  - prompt_id: h11-hc-request-shape
    target_symbol: hc
    bucket: held_out
    step13_bucket: tie
    prompt: "I'm calling a Hono route from another TypeScript service using `hc`. What shape do I pass when the route expects a JSON body?"
    notes: "hc client."

  - prompt_id: h12-middleware-storage-location
    target_symbol: Hono
    bucket: held_out
    step13_bucket: tie
    prompt: "I'm debugging a case where one of my middlewares isn't running in the order I expected. Where does Hono actually store the registered middleware — can I inspect it to see the order?"
    notes: "middleware storage location."
