# ContextAtlas config for httpx benchmark target.
#
# Pre-registered: committed BEFORE any CA baseline measurement to
# prevent p-hacking. Changing this file after baseline runs
# invalidates prior results — same policy as prompts/.
#
# **Extraction is blocked until main-repo step 9.** contextatlas's
# adapter registry throws "Python adapter not yet implemented"
# when languages contains 'python'. This config is committed now
# so that when the Python adapter lands upstream, step-13
# extraction runs against it unchanged. Phase 3 validates the
# harness against hono only.
#
# All paths resolve against the benchmarks repo root (passed as
# `configRoot`, per ADR-08). See configs/hono.yml for the detailed
# path-resolution note.

version: 1

languages: [python]

source:
  root: repos/httpx/

adrs:
  path: adrs/httpx/

docs:
  # ADRs-only extraction. See configs/hono.yml for rationale.
  include: []

atlas:
  committed: true
  path: atlases/httpx/atlas.json
  local_cache: atlases/httpx/index.db
