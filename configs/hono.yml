# ContextAtlas config for hono benchmark target.
#
# Pre-registered: committed BEFORE any CA baseline measurement to
# prevent p-hacking. Changing this file after baseline runs
# invalidates prior results — same policy as prompts/.
#
# All paths below resolve against the benchmarks repo root (passed
# as `configRoot` in the extraction pipeline and `--config-root`
# on the MCP binary, per ADR-08). `source.root` names where the
# cloned source code lives; other paths live in our benchmarks
# repo directly so the atlas, ADRs, and cache stay version-
# controlled alongside the harness code.

version: 1

languages: [typescript]

source:
  # Cloned upstream repo. Gitignored — see RUBRIC.md for the pinned SHA.
  root: repos/hono/

adrs:
  # Curated ADRs for the benchmark. NOT hono's own docs — the
  # atlas reflects our methodology, not upstream documentation.
  path: adrs/hono/

docs:
  # Empty array is an explicit override that disables the default
  # docs.include (README.md, docs/**/*.md, CONTRIBUTING.md).
  # ADRs-only extraction keeps the atlas scoped to our methodology.
  include: []

atlas:
  committed: true
  # The atlas lives in our benchmarks repo (committed) alongside
  # the ADRs it was extracted from.
  path: atlases/hono/atlas.json
  # Local sqlite cache for incremental extraction — sits next to
  # the atlas. Gitignored via atlases/*/index.db.
  local_cache: atlases/hono/index.db
