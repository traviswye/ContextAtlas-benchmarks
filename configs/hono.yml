# ContextAtlas config for hono benchmark target.
#
# Pre-registered: committed BEFORE any CA baseline measurement to
# prevent p-hacking. Changing this file after baseline runs
# invalidates prior results — same policy as prompts/.
#
# This file lives in the benchmarks repo; the harness copies it to
# repos/hono/.contextatlas.yml at extraction and runtime because
# contextatlas looks for the config in the target repo's cwd.
# The repos/ directory is gitignored so the copy doesn't pollute
# our git or affect hono's own tree (the target repo sees an
# untracked file we clean up after the run).

version: 1

languages: [typescript]

adrs:
  # Paths resolve from the target repo root (repos/hono/), so
  # ../../ goes up to the benchmarks root and into our curated
  # ADR set — NOT hono's own docs.
  path: ../../adrs/hono/

docs:
  # Empty array is an explicit override that disables the default
  # docs.include (README.md, docs/**/*.md, CONTRIBUTING.md).
  # Verified against contextatlas's config parser. We want
  # ADRs-only extraction so the atlas reflects our methodology,
  # not hono's upstream documentation.
  include: []

atlas:
  committed: true
  # The atlas lives in our benchmarks repo (committed) rather than
  # inside the target repo. Runtime MCP reads from the same path.
  path: ../../atlases/hono/atlas.json
  # Local sqlite cache for incremental extraction. Lands under
  # repos/hono/.contextatlas/ which is gitignored in our repo.
  local_cache: .contextatlas/index.db
